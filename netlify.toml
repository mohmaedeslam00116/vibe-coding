[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 🌟 Proxy: /zen/* ← طلبات API تذهب إلى OpenCode Zen عبر Netlify CDN
# لا Function ولا Worker ولا CORS ولا Rate Limit!
[[redirects]]
  from = "/zen/*"
  to = "https://opencode.ai/zen/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
